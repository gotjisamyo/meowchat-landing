<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowChat - AI Chatbot for Thai Business</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        p { font-size: 1.5rem; margin-bottom: 30px; opacity: 0.9; }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #06c755;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .features {
            margin-top: 50px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 MeowChat</h1>
        <p>AI Chatbot สำหรับธุรกิจไทย</p>
        <a href="https://line.me/ti/p/@960xboyt" class="btn">➤ Add LINE @960xboyt</a>
        <div class="features">
            <div class="feature">🤖 AI ฉลาด</div>
            <div class="feature">⚡ ตอบเร็ว</div>
            <div class="feature">💕 อ่อนหวาน</div>
        </div>
    </div>
</body>
</html>
